<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏡 Mallorca Immobilien — Ranking Tool</title>
<style>
:root {
  --bg-primary: #0f0f23;
  --bg-secondary: #1a1a2e;
  --bg-card: #16213e;
  --bg-input: #222;
  --text-primary: #e0e0e0;
  --text-secondary: #aaa;
  --text-muted: #888;
  --accent: #4fc3f7;
  --accent-hover: #29b6f6;
  --success: #69f0ae;
  --warning: #ffab40;
  --error: #ff6b6b;
  --border: #333;
  --shadow: 0 4px 12px rgba(0,0,0,0.3);
  --radius: 12px;
  --radius-sm: 8px;
  --spacing: 1rem;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: var(--spacing);
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 2rem;
  padding: 1.5rem;
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.header h1 {
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, var(--accent), var(--success));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header p {
  color: var(--text-secondary);
  font-size: 1.1rem;
}

/* Layout */
.main-content {
  display: grid;
  gap: 1.5rem;
  grid-template-columns: 1fr;
}

@media (min-width: 768px) {
  .main-content {
    grid-template-columns: 320px 1fr;
  }
}

/* Controls Sidebar */
.controls {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 1.5rem;
  position: sticky;
  top: var(--spacing);
  height: fit-content;
  box-shadow: var(--shadow);
}

.controls-section {
  margin-bottom: 1.5rem;
}

.controls-section:last-child {
  margin-bottom: 0;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5rem 0;
  margin-bottom: 1rem;
  cursor: pointer;
  user-select: none;
}

.section-title {
  font-size: 0.9rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}

.toggle-icon {
  transition: transform 0.2s ease;
  color: var(--accent);
  font-size: 1.2rem;
}

.section-content {
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.section-content.collapsed {
  max-height: 0;
}

/* Slider Styles */
.slider-group {
  margin-bottom: 1rem;
}

.slider-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
  font-size: 0.85rem;
}

.slider-value {
  color: var(--accent);
  font-weight: 600;
  min-width: 40px;
  text-align: right;
  font-family: monospace;
}

input[type="range"] {
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: var(--bg-input);
  outline: none;
  -webkit-appearance: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(79, 195, 247, 0.3);
}

input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
  box-shadow: 0 2px 6px rgba(79, 195, 247, 0.3);
}

/* Total Bar */
.total-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  margin: 1rem 0;
  font-weight: 600;
}

.total-warn {
  color: var(--error);
}

.total-ok {
  color: var(--success);
}

/* Property Cards */
.properties-grid {
  display: grid;
  gap: 1.5rem;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
}

.property-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  position: relative;
}

.property-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.property-rank {
  position: absolute;
  top: 1rem;
  right: 1rem;
  width: 40px;
  height: 40px;
  background: var(--accent);
  color: var(--bg-primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 1.2rem;
  z-index: 2;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.property-rank.top3 {
  background: linear-gradient(135deg, #ffd700, #ffb300);
}

.property-image {
  width: 100%;
  height: 200px;
  object-fit: cover;
  background: var(--bg-input);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 0.9rem;
}

.property-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.property-content {
  padding: 1.5rem;
}

.property-header {
  margin-bottom: 1rem;
}

.property-name {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: var(--text-primary);
}

.property-location {
  color: var(--text-secondary);
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.property-location::before {
  content: "📍";
}

/* Score Display */
.score-display {
  margin: 1rem 0;
  padding: 1rem;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
}

.score-bar {
  height: 24px;
  background: var(--bg-secondary);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  margin-bottom: 0.5rem;
}

.score-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--error) 0%, var(--warning) 50%, var(--success) 100%);
  border-radius: 12px;
  transition: width 0.3s ease;
  position: relative;
}

.score-text {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
}

.score-value {
  font-family: monospace;
  font-size: 1.1rem;
}

/* Property Stats */
.property-stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.stat-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85rem;
  padding: 0.3rem 0;
}

.stat-label {
  color: var(--text-secondary);
}

.stat-value {
  font-weight: 600;
  color: var(--text-primary);
}

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 0.25rem 0.75rem;
  border-radius: 16px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.badge-yes {
  background: var(--success);
  color: var(--bg-primary);
}

.badge-maybe {
  background: var(--warning);
  color: var(--bg-primary);
}

.badge-no {
  background: var(--text-muted);
  color: var(--text-primary);
}

/* Mobile Optimizations */
@media (max-width: 767px) {
  .container {
    padding: 0.5rem;
  }
  
  .header {
    margin-bottom: 1rem;
    padding: 1rem;
  }
  
  .controls {
    position: relative;
    margin-bottom: 1rem;
  }
  
  .properties-grid {
    grid-template-columns: 1fr;
  }
  
  .property-stats {
    grid-template-columns: 1fr;
  }
}

/* Loading Animation */
@keyframes pulse {
  0%, 100% {
    opacity: 1;
  }
  50% {
    opacity: 0.5;
  }
}

.loading {
  animation: pulse 1.5s ease-in-out infinite;
}

/* Utility Classes */
.hidden {
  display: none;
}

.text-center {
  text-align: center;
}

.mb-1 {
  margin-bottom: 0.5rem;
}

.mb-2 {
  margin-bottom: 1rem;
}

/* Dark mode is default, but we can add light mode later */
</style>
</head>

        <div class="controls-section">

            <span class="toggle-icon" id="rooms-icon">+</span>
          </div>
          <div class="section-content collapsed" id="rooms-content">
            <div id="rooms-sliders"></div>
          </div>
        </div>

        <!-- Grundstück -->
        <div class="controls-section">
          <div class="section-header" onclick="toggleSection('land')">
            <span class="section-title">🌳 Grundstück</span>
            <span class="toggle-icon" id="land-icon">+</span>
          </div>
          <div class="section-content collapsed" id="land-content">
            <div id="land-sliders"></div>
          </div>

      </aside>

      <!-- Properties Grid -->
      <main>
        <div class="properties-grid" id="properties-container">

        </div>
      </main>
    </div>
  </div>
