<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mallorca Immobilien Ranking</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e8e8; min-height: 100vh; }

  header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 24px 32px; border-bottom: 1px solid #2a2a3e; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  header h1 { font-size: 1.6rem; font-weight: 700; color: #fff; }
  header h1 span { color: #f0a500; }
  #count { font-size: 0.9rem; color: #888; }

  .controls { background: #15151f; padding: 20px 32px; border-bottom: 1px solid #2a2a3e; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
  .ctrl-group label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select { background: #1e1e2e; border: 1px solid #333; color: #e8e8e8; padding: 7px 12px; border-radius: 6px; font-size: 0.85rem; outline: none; }
  input:focus, select:focus { border-color: #f0a500; }
  input[type=range] { width: 120px; padding: 4px 0; accent-color: #f0a500; }
  .range-val { font-size: 0.75rem; color: #f0a500; text-align: center; }
  button { background: #f0a500; color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
  button:hover { background: #ffc107; }
  button.secondary { background: #2a2a3e; color: #e8e8e8; }
  button.secondary:hover { background: #3a3a5e; }

  #sort-bar { background: #12121a; padding: 10px 32px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #1e1e2e; }
  #sort-bar span { font-size: 0.75rem; color: #666; margin-right: 4px; }
  .sort-btn { background: none; border: 1px solid #2a2a3e; color: #aaa; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  .sort-btn.active { background: #f0a500; color: #000; border-color: #f0a500; font-weight: 600; }

  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; padding: 24px 32px; }

  .card { background: #1a1a2a; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a3e; transition: transform 0.15s, border-color 0.15s; cursor: pointer; }
  .card:hover { transform: translateY(-2px); border-color: #f0a500; }
  .card.hidden { display: none; }

  .card-img { position: relative; height: 220px; overflow: hidden; background: #0d0d1a; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
  .card:hover .card-img img { transform: scale(1.03); }
  .card-img .no-img { display: flex; align-items: center; justify-content: center; height: 100%; color: #444; font-size: 0.85rem; }
  .sold-ribbon { position: absolute; top: 18px; right: -30px; width: 130px; background: #e53935; color: #fff; font-size: 0.72rem; font-weight: 700; text-align: center; padding: 5px 0; transform: rotate(45deg); letter-spacing: 0.08em; text-transform: uppercase; z-index: 10; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
  .sold-ribbon.offline { background: #1565c0; }
  .card.sold { opacity: 0.7; }
  .badge-rang { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.75); color: #f0a500; font-weight: 700; font-size: 0.85rem; padding: 3px 10px; border-radius: 20px; backdrop-filter: blur(4px); }
  .badge-score { position: absolute; top: 10px; right: 10px; background: #f0a500; color: #000; font-weight: 700; font-size: 0.9rem; padding: 3px 10px; border-radius: 20px; }
  .makler-badge { position: absolute; bottom: 8px; left: 10px; background: rgba(0,0,0,0.7); color: #bbb; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; backdrop-filter: blur(4px); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .card-body { padding: 14px 16px; }
  .card-title { font-size: 0.92rem; font-weight: 600; color: #fff; margin-bottom: 6px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-loc { font-size: 0.78rem; color: #f0a500; margin-bottom: 10px; }

  .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .stat { background: #12121a; border-radius: 6px; padding: 6px 10px; }
  .stat-label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-val { font-size: 0.88rem; font-weight: 600; color: #e8e8e8; }

  .card-dist { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .dist-chip { background: #1e1e30; border: 1px solid #2a2a3e; border-radius: 20px; padding: 3px 10px; font-size: 0.72rem; color: #aaa; }
  .dist-chip b { color: #e8e8e8; }

  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .bar-label { font-size: 0.7rem; color: #888; width: 60px; flex-shrink: 0; }
  .bar-track { flex: 1; background: #12121a; border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .bar-charme .bar-fill { background: linear-gradient(90deg, #f0a500, #ffd700); }
  .bar-reno .bar-fill { background: linear-gradient(90deg, #2ecc71, #e74c3c); }
  .bar-num { font-size: 0.7rem; color: #888; width: 30px; text-align: right; }

  .card-footer { padding: 10px 16px; border-top: 1px solid #1e1e2e; display: flex; justify-content: space-between; align-items: center; }
  .preis { font-size: 1.05rem; font-weight: 700; color: #fff; }
  .preis-sub { font-size: 0.7rem; color: #666; }
  .card-link { color: #f0a500; font-size: 0.78rem; text-decoration: none; }
  .card-link:hover { text-decoration: underline; }

  /* Modal */
  #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; padding: 20px; overflow-y: auto; }
  #modal.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal-inner { background: #1a1a2a; border-radius: 16px; max-width: 900px; width: 100%; margin: auto; overflow: hidden; border: 1px solid #3a3a5e; }
  .modal-img { width: 100%; max-height: 450px; object-fit: cover; }
  .modal-body { padding: 24px; }
  .modal-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
  .modal-loc { color: #f0a500; margin-bottom: 16px; }
  .modal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .modal-stat { background: #12121a; border-radius: 8px; padding: 10px 14px; }
  .modal-stat .label { font-size: 0.7rem; color: #666; text-transform: uppercase; }
  .modal-stat .val { font-size: 1rem; font-weight: 600; }
  .modal-close { float: right; background: #2a2a3e; border: none; color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; margin-bottom: 16px; }
  .modal-close:hover { background: #3a3a5e; }

  #no-results { display: none; text-align: center; padding: 80px; color: #555; font-size: 1.1rem; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🏝 Mallorca <span>Ranking</span></h1>
    <div id="count">Lade...</div>
  </div>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label>Suche</label>
    <input type="text" id="search" placeholder="Name, Ort, Makler..." style="width:220px">
  </div>
  <div class="ctrl-group">
    <label>Ort</label>
    <select id="filter-ort" style="width:160px"><option value="">Alle Orte</option></select>
  </div>
  <div class="ctrl-group">
    <label>Makler</label>
    <select id="filter-makler" style="width:180px"><option value="">Alle Makler</option></select>
  </div>
  <div class="ctrl-group">
    <label>Zimmer (min)</label>
    <select id="filter-zimmer">
      <option value="0">Alle</option>
      <option value="3">3+</option>
      <option value="4">4+</option>
      <option value="5" selected>5+</option>
      <option value="6">6+</option>
      <option value="8">8+</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Min Charme</label>
    <select id="filter-charme">
      <option value="1">Alle</option>
      <option value="3">3+</option>
      <option value="4">4+</option>
      <option value="5">5</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Max Preis (Mio €)</label>
    <input type="range" id="filter-preis" min="0" max="30" step="0.5" value="30">
    <div class="range-val" id="preis-val">alle</div>
  </div>
  <div class="ctrl-group">
    <label>Max Reno %</label>
    <input type="range" id="filter-reno" min="0" max="100" step="5" value="100">
    <div class="range-val" id="reno-val">alle</div>
  </div>
  <div class="ctrl-group">
    <label>Max Erreichbarkeit</label>
    <input type="range" id="filter-erreich" min="0" max="100" step="5" value="0">
    <div class="range-val" id="erreich-val">alle</div>
  </div>
  <div class="ctrl-group" style="justify-content:flex-end">
  <div class="ctrl-group" style="justify-content:flex-end">
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.8rem;color:#aaa">
      <input type="checkbox" id="filter-hide-sold" checked style="width:auto;accent-color:#e53935"> Verkaufte ausblenden
    </label>
    <button id="btn-only-sold" onclick="toggleOnlySold()" style="background:#e53935;color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:0.8rem">Nur Delisted</button>
  </div>
    <button class="secondary" onclick="resetFilters()">Reset</button>
  </div>
</div>

<div id="sort-bar">
  <span>Sortieren:</span>
  <button class="sort-btn active" data-sort="rang">Score ↓</button>
  <button class="sort-btn" data-sort="preis-asc">Preis ↑</button>
  <button class="sort-btn" data-sort="preis-desc">Preis ↓</button>
  <button class="sort-btn" data-sort="charme">Charme ↓</button>
  <button class="sort-btn" data-sort="reno">Reno ↑</button>
  <button class="sort-btn" data-sort="daia">Daia ↑</button>
  <button class="sort-btn" data-sort="grundst">Grundstück ↓</button>
</div>

<div id="grid"></div>
<div id="no-results">Keine Objekte gefunden.</div>

<!-- Modal -->
<div id="modal" onclick="closeModal(event)">
  <div class="modal-inner" id="modal-inner">
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

let currentSort = 'rang';
let filtered = [...DATA];

function fmt(n) {
  if (!n) return '—';
  return n.toLocaleString('de-DE');
}
function fmtPreis(n) {
  if (!n) return '—';
  if (n >= 1000000) return (n/1000000).toFixed(2).replace('.',',') + ' Mio €';
  return n.toLocaleString('de-DE') + ' €';
}

function stars(n) {
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

function buildCard(p) {
  const img = p.img ? `<img src="${p.img}" loading="lazy" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=no-img>Kein Bild</div>'">` : '<div class="no-img">Kein Bild</div>';
  const renoColor = p.reno < 20 ? '#2ecc71' : p.reno < 50 ? '#f0a500' : '#e74c3c';
  const isSold = p.delisted === true;
  const ribbonClass = p.link_status === 'OFFLINE' ? 'sold-ribbon offline' : 'sold-ribbon';
  const ribbonText = p.link_status === 'OFFLINE' ? 'Offline' : 'Verkauft';
  const soldRibbon = isSold ? `<div class="${ribbonClass}">${ribbonText}</div>` : '';
  return `
  <div class="card${isSold ? ' sold' : ''}" data-nr="${p.nr}" data-sold="${isSold}" onclick="openModal(${p.nr})">
    <div class="card-img">
      ${img}
      ${soldRibbon}
      <div class="badge-rang">#${p.rang}</div>
      <div class="badge-score">${p.score}</div>
      <div class="makler-badge">${p.makler}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${p.name}</div>
      <div class="card-loc">📍 ${p.ort}</div>
      <div class="card-stats">
        <div class="stat"><div class="stat-label">Zimmer</div><div class="stat-val">${p.zimmer || '—'}</div></div>
        <div class="stat"><div class="stat-label">Grundstück</div><div class="stat-val">${p.grundst ? fmt(p.grundst)+' m²' : '—'}</div></div>
        <div class="stat"><div class="stat-label">Fläche bebaut</div><div class="stat-val">${p.flaeche ? fmt(p.flaeche)+' m²' : '—'}</div></div>
        <div class="stat"><div class="stat-label">€/m² bebaut</div><div class="stat-val">${p.preis_m2_bebaut ? fmt(Math.round(p.preis_m2_bebaut)) : '—'}</div></div>
      </div>
      <div class="card-dist">
        <div class="dist-chip">✈️ <b>${p.flughafen_min || '?'} min</b></div>
        <div class="dist-chip">🏠 Daia <b>${p.daia_min || '?'} min</b></div>
        <div class="dist-chip">⚓ Andratx <b>${p.andratx_min || '?'} min</b></div>
        <div class="dist-chip">🌊 Salines <b>${p.salines_min || '?'} min</b></div>
      </div>
      <div class="bar-row bar-charme">
        <div class="bar-label">Charme</div>
        <div class="bar-track"><div class="bar-fill" style="width:${p.charme/5*100}%"></div></div>
        <div class="bar-num">${p.charme}/5</div>
      </div>
      <div class="bar-row bar-reno">
        <div class="bar-label">Reno</div>
        <div class="bar-track"><div class="bar-fill" style="width:${p.reno}%;background:${renoColor}"></div></div>
        <div class="bar-num">${p.reno}%</div>
      </div>
    </div>
    <div class="card-footer">
      <div>
        <div class="preis">${fmtPreis(p.preis)}</div>
        <div class="preis-sub">${p.preis_m2_grundst ? fmt(Math.round(p.preis_m2_grundst))+' €/m² Grundst.' : ''}</div>
      </div>
      ${p.url ? `<a class="card-link" href="${p.url}" target="_blank" onclick="event.stopPropagation()">Exposé →</a>` : ''}
    </div>
  </div>`;
}

function openModal(nr) {
  const p = DATA.find(x => x.nr === nr);
  if (!p) return;
  const renoColor = p.reno < 20 ? '#2ecc71' : p.reno < 50 ? '#f0a500' : '#e74c3c';
  document.getElementById('modal-body').innerHTML = `
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕ Schließen</button>
    ${p.img ? `<img class="modal-img" src="${p.img}" alt="${p.name}">` : ''}
    <div class="modal-title">${p.name}</div>
    <div class="modal-loc">📍 ${p.ort} · Rang #${p.rang} · Score ${p.score} · ${p.makler}</div>
    <div class="modal-grid">
      <div class="modal-stat"><div class="label">Preis</div><div class="val">${fmtPreis(p.preis)}</div></div>
      <div class="modal-stat"><div class="label">Zimmer / Bäder</div><div class="val">${p.zimmer || '—'} / ${p.baeder || '—'}</div></div>
      <div class="modal-stat"><div class="label">Grundstück</div><div class="val">${fmt(p.grundst)} m²</div></div>
      <div class="modal-stat"><div class="label">Bebaut</div><div class="val">${fmt(p.flaeche)} m²</div></div>
      <div class="modal-stat"><div class="label">Garten bewirtsch.</div><div class="val">${fmt(p.garten)} m²</div></div>
      <div class="modal-stat"><div class="label">€/m² bebaut</div><div class="val">${fmt(Math.round(p.preis_m2_bebaut))}</div></div>
      <div class="modal-stat"><div class="label">€/m² Grundstück</div><div class="val">${fmt(Math.round(p.preis_m2_grundst))}</div></div>
      <div class="modal-stat"><div class="label">Charme</div><div class="val" style="color:#f0a500">${stars(p.charme)}</div></div>
      <div class="modal-stat"><div class="label">Renovierung</div><div class="val" style="color:${renoColor}">${p.reno}%</div></div>
      <div class="modal-stat"><div class="label">✈️ Flughafen</div><div class="val">${p.flughafen_min} min (${p.flughafen_km} km)</div></div>
      <div class="modal-stat"><div class="label">🏠 Daia</div><div class="val">${p.daia_min} min (${p.daia_km} km)</div></div>
      <div class="modal-stat"><div class="label">⚓ Andratx</div><div class="val">${p.andratx_min} min (${p.andratx_km} km)</div></div>
      <div class="modal-stat"><div class="label">🌊 Ses Salines</div><div class="val">${p.salines_min} min (${p.salines_km} km)</div></div>
    </div>
    ${p.kommentar ? `<div style="background:#12121a;padding:12px;border-radius:8px;font-size:0.85rem;color:#aaa;margin-bottom:12px">${p.kommentar}</div>` : ''}
    ${p.url ? `<a href="${p.url}" target="_blank" style="display:inline-block;background:#f0a500;color:#000;padding:10px 20px;border-radius:8px;font-weight:700;text-decoration:none">Exposé öffnen →</a>` : ''}
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const ort = document.getElementById('filter-ort').value;
  const makler = document.getElementById('filter-makler').value;
  const zimmer = parseInt(document.getElementById('filter-zimmer').value) || 0;
  const maxPreis = parseFloat(document.getElementById('filter-preis').value) * 1000000;
  const maxReno = parseInt(document.getElementById('filter-reno').value);
  const minCharme = parseInt(document.getElementById('filter-charme').value);
  const minErreich = parseInt(document.getElementById('filter-erreich').value);
  const hideSold = document.getElementById('filter-hide-sold').checked;

  filtered = DATA.filter(p => {
    if (onlySoldMode && p.delisted !== true) return false;
    if (!onlySoldMode && hideSold && p.delisted === true) return false;
    if (search && !`${p.name} ${p.ort} ${p.makler}`.toLowerCase().includes(search)) return false;
    if (ort && p.ort !== ort) return false;
    if (makler && !p.makler.toLowerCase().includes(makler.toLowerCase())) return false;
    if (p.zimmer < zimmer) return false;
    if (maxPreis < 30000000 && p.preis > maxPreis) return false;
    if (p.reno > maxReno) return false;
    if (p.charme < minCharme) return false;
    if (minErreich > 0 && (p.erreich_score || 0) < minErreich) return false;
    return true;
  });

  sortAndRender();
}

function sortAndRender() {
  filtered.sort((a, b) => {
    switch(currentSort) {
      case 'rang': return a.rang - b.rang;
      case 'preis-asc': return a.preis - b.preis;
      case 'preis-desc': return b.preis - a.preis;
      case 'charme': return b.charme - a.charme || a.rang - b.rang;
      case 'reno': return a.reno - b.reno || a.rang - b.rang;
      case 'daia': return (a.daia_min||999) - (b.daia_min||999);
      case 'grundst': return (b.grundst||0) - (a.grundst||0);
      default: return a.rang - b.rang;
    }
  });

  const grid = document.getElementById('grid');
  grid.innerHTML = filtered.map(buildCard).join('');
  document.getElementById('count').textContent = `${filtered.length} von ${DATA.length} Objekten`;
  document.getElementById('no-results').style.display = filtered.length === 0 ? 'block' : 'none';
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-ort').value = '';
  document.getElementById('filter-makler').value = '';
  document.getElementById('filter-zimmer').value = '5';
  document.getElementById('filter-preis').value = 30;
  document.getElementById('filter-reno').value = 100;
  document.getElementById('filter-charme').value = 1;
  document.getElementById('filter-erreich').value = 0;
  document.getElementById('preis-val').textContent = 'alle';
  document.getElementById('reno-val').textContent = 'alle';
  document.getElementById('erreich-val').textContent = 'alle';
  filtered = [...DATA];
  sortAndRender();
}

// Init
const orte = [...new Set(DATA.map(p => p.ort).filter(Boolean))].sort();
orte.forEach(o => { const opt = document.createElement('option'); opt.value = o; opt.textContent = o; document.getElementById('filter-ort').appendChild(opt); });

const makler = [...new Set(DATA.map(p => p.makler).filter(Boolean))].sort();
makler.forEach(m => { const opt = document.createElement('option'); opt.value = m; opt.textContent = m; document.getElementById('filter-makler').appendChild(opt); });

document.getElementById('filter-preis').addEventListener('input', function() {
  document.getElementById('preis-val').textContent = this.value >= 30 ? 'alle' : this.value + ' Mio';
  applyFilters();
});
document.getElementById('filter-reno').addEventListener('input', function() {
  document.getElementById('reno-val').textContent = this.value >= 100 ? 'alle' : this.value + '%';
  applyFilters();
});
document.getElementById('filter-erreich').addEventListener('input', function() {
  document.getElementById('erreich-val').textContent = this.value <= 0 ? 'alle' : this.value;
  applyFilters();
});
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filter-ort').addEventListener('change', applyFilters);
document.getElementById('filter-makler').addEventListener('change', applyFilters);
document.getElementById('filter-zimmer').addEventListener('change', applyFilters);
document.getElementById('filter-charme').addEventListener('change', applyFilters);
document.getElementById('filter-hide-sold').addEventListener('change', applyFilters);

let onlySoldMode = false;
function toggleOnlySold() {
  onlySoldMode = !onlySoldMode;
  const btn = document.getElementById('btn-only-sold');
  const cb = document.getElementById('filter-hide-sold');
  if (onlySoldMode) {
    btn.style.background = '#fff';
    btn.style.color = '#e53935';
    btn.style.outline = '2px solid #e53935';
    cb.checked = false;
    cb.disabled = true;
  } else {
    btn.style.background = '#e53935';
    btn.style.color = '#fff';
    btn.style.outline = 'none';
    cb.checked = true;
    cb.disabled = false;
  }
  applyFilters();
}

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentSort = this.dataset.sort;
    sortAndRender();
  });
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal').classList.remove('open'); });

sortAndRender();
</script>
