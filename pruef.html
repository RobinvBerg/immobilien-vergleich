.btn-ok:hover { background: #27ae60; }

.filter-bar { margin-bottom: 16px; display: flex; gap: 10px; }

const state = {};
DATA.forEach(p => state[p.nr] = 'open');

let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function mark(nr, val) {
  state[nr] = val;
  updateStats();
  render();
}

function updateStats() {
  const ok = Object.values(state).filter(v=>v==='ok').length;
  const nok = Object.values(state).filter(v=>v==='nok').length;
  const open = Object.values(state).filter(v=>v==='open').length;
  document.getElementById('cnt-ok').textContent = ok;
  document.getElementById('cnt-nok').textContent = nok;
  document.getElementById('cnt-open').textContent = open;
  document.getElementById('total').textContent = DATA.length;

  if (open === 0) {
    const bad = DATA.filter(p => state[p.nr] === 'nok');
    const sum = document.getElementById('summary');
    sum.style.display = 'block';
    sum.innerHTML = `<b>✅ Prüfung abgeschlossen!</b><br>
    ${ok} OK · ${nok} Falsch<br><br>
    ${nok > 0 ? '<b>Falsche Bilder (Nr.):</b> ' + bad.map(p=>p.nr).join(', ') : 'Alles korrekt!'}`;
  }
}

function render() {
  const list = document.getElementById('list');
  const filtered = DATA.filter(p => {
    if (currentFilter === 'open') return state[p.nr] === 'open';
    if (currentFilter === 'ok') return state[p.nr] === 'ok';
    if (currentFilter === 'nok') return state[p.nr] === 'nok';
    if (currentFilter === 'lb') return p.makler.includes('Living Blue');
    return true;
  });

  list.innerHTML = filtered.map(p => `
    <div class="row ${state[p.nr] === 'ok' ? 'ok' : state[p.nr] === 'nok' ? 'nok' : ''}" id="row-${p.nr}">
      <div class="nr">#${p.nr}</div>
      <img class="thumb" src="${p.img}" alt="${p.name}" onclick="window.open('${p.img}','_blank')">
      <div class="info">
        <div class="name">${p.name.substring(0,70)}</div>
        <div class="meta">📍 ${p.ort} · ${p.makler} · €${(p.preis/1000000).toFixed(2)}M</div>
      </div>
      <div class="btns">
        <button class="btn-ok" onclick="mark(${p.nr},'ok')">✅ Stimmt</button>
        <button class="btn-nok" onclick="mark(${p.nr},'nok')">❌ Falsch</button>
        ${p.url && p.url !== '—' ? `<button class="btn-link" onclick="window.open('${p.url}','_blank')">Makler →</button>` : ''}
      </div>
    </div>
  `).join('');
}

updateStats();
render();
</script>
