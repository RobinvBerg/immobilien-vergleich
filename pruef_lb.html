const state = {};
DATA.forEach(p => state[p.nr] = 'open');
let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function mark(nr, val) {
  state[nr] = val;
  updateStats();
  render();
}

function updateStats() {
  const ok = Object.values(state).filter(v=>v==='ok').length;
  const nok = Object.values(state).filter(v=>v==='nok').length;
  const skip = Object.values(state).filter(v=>v==='skip').length;
  const open = Object.values(state).filter(v=>v==='open').length;
  document.getElementById('cnt-ok').textContent = ok;
  document.getElementById('cnt-nok').textContent = nok;
  document.getElementById('cnt-skip').textContent = skip;
  document.getElementById('cnt-open').textContent = open;
  const done = ok + nok + skip;
  document.getElementById('progress').style.width = (done/DATA.length*100)+'%';

  if (open === 0) {
    const bad = DATA.filter(p => state[p.nr] === 'nok');
    document.getElementById('summary').style.display = 'block';
    document.getElementById('sum-text').textContent = `${ok} OK · ${nok} Falsch · ${skip} Unsicher`;
    document.getElementById('bad-list').innerHTML = nok > 0
      ? '<b>Falsche Nummern:</b> ' + bad.map(p=>`Nr.${p.nr} (${p.ort})`).join(', ')
      : 'Alles korrekt!';
  }
}

function render() {
  const filtered = DATA.filter(p => {
    if (currentFilter === 'open') return state[p.nr] === 'open';
    if (currentFilter === 'ok') return state[p.nr] === 'ok';
    if (currentFilter === 'nok') return state[p.nr] === 'nok';
    if (currentFilter === 'skip') return state[p.nr] === 'skip';
    return true;
  });

  document.getElementById('list').innerHTML = filtered.map(p => `
    <div class="row ${state[p.nr]}" id="row-${p.nr}">
      <div class="nr">${p.nr}</div>
      <div class="thumb-wrap">
        <img class="thumb" src="${p.img}" alt="" onclick="window.open('${p.img}','_blank')" title="Klick = Vollbild">
        <div class="thumb-hint">Klick = Vollbild</div>
      </div>
      <div class="info">
        <div class="name">${p.name.substring(0,80)}</div>
        <div class="meta">📍 ${p.ort} · €${p.preis ? (p.preis/1000000).toFixed(2)+'M' : '?'}</div>
        ${p.url && p.url !== '—' ? `<a class="link-btn" href="${p.url}" target="_blank">🔗 LivingBlue Seite öffnen →</a>` : '<span style="color:#666;font-size:0.75rem">Kein Link</span>'}
      </div>
      <div class="btns">
        <button class="btn-ok" onclick="mark(${p.nr},'ok')">✅ Stimmt</button>
        <button class="btn-nok" onclick="mark(${p.nr},'nok')">❌ Falsch</button>
        <button class="btn-skip" onclick="mark(${p.nr},'skip')">⏭ Unsicher</button>
      </div>
    </div>
  `).join('');
}

updateStats();
render();
</script>
